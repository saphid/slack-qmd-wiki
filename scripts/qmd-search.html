<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QMD Search</title>
  <style>
    :root { color-scheme: dark; --bg:#07101a; --panel:#101b2b; --panel2:#0b1420; --text:#eef4ff; --muted:#9aa7bb; --border:#263247; --accent:#7484ff; --bad:#ff7878; --warn:#facc15; --ok:#22c55e; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--text); background: radial-gradient(circle at 20% 0, rgba(116,132,255,.18), transparent 28rem), linear-gradient(135deg,#060b13,#0b1320); line-height: 1.45; }
    button, input, select { font: inherit; }
    button { cursor: pointer; border: 1px solid var(--border); background: #182235; color: var(--text); border-radius: .55rem; padding: .58rem .75rem; }
    button.primary { border: 0; background: linear-gradient(135deg,#6978ff,#4f5fe8); font-weight: 800; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    input, select { width: 100%; border: 1px solid var(--border); border-radius: .55rem; background: #07111d; color: var(--text); padding: .6rem .7rem; }
    label { display: grid; gap: .35rem; color: #c4cedd; font-size: .9rem; }
    .app { width: min(1180px, calc(100vw - 2rem)); margin: 0 auto; padding: 1.3rem 0 2rem; }
    header { display: flex; justify-content: space-between; gap: 1rem; align-items: end; margin-bottom: 1rem; }
    h1 { margin: 0; font-size: 1.4rem; letter-spacing: -.02em; }
    .subtle { color: var(--muted); }
    .panel { border: 1px solid var(--border); background: rgba(16,27,43,.88); border-radius: .9rem; box-shadow: 0 22px 70px rgba(0,0,0,.28); }
    .search-panel { padding: .9rem; display: grid; gap: .75rem; }
    .query-row { display: grid; grid-template-columns: 1fr auto auto; gap: .6rem; }
    .query-box { position: relative; min-width: 0; }
    .suggest-box { position: absolute; z-index: 10; left: 0; right: 0; top: calc(100% + .35rem); border: 1px solid var(--border); border-radius: .7rem; background: #0b1420; box-shadow: 0 18px 50px rgba(0,0,0,.4); overflow: hidden; }
    .suggest-box[hidden] { display: none; }
    .suggest-box button { display: grid; grid-template-columns: minmax(0, 1fr) auto; width: 100%; border: 0; border-radius: 0; background: transparent; text-align: left; padding: .55rem .7rem; }
    .suggest-box button:hover, .suggest-box button.active { background: rgba(116,132,255,.18); }
    .suggest-sub { color: var(--muted); font-size: .82rem; padding-left: .65rem; }
    .suggest-empty { padding: .65rem .75rem; color: var(--muted); }
    .controls { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: .65rem; }
    .collections { display: flex; flex-wrap: wrap; gap: .7rem; align-items: center; }
    .collections label { display: inline-flex; width: auto; grid-auto-flow: column; align-items: center; gap: .35rem; }
    .collections input { width: auto; }
    .filters { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: .65rem; }
    .status { margin: .9rem 0; padding: .75rem .9rem; border: 1px solid var(--border); border-radius: .7rem; background: rgba(7,17,29,.8); }
    .status.warn { border-color: rgba(250,204,21,.5); color: var(--warn); }
    .status.bad { border-color: rgba(255,120,120,.55); color: var(--bad); }
    .results { display: grid; gap: .75rem; }
    .result { padding: .9rem; }
    .result h2 { margin: .5rem 0 .25rem; font-size: 1.05rem; }
    .badges { display: flex; flex-wrap: wrap; gap: .35rem; }
    .badge { border: 1px solid var(--border); background: #0b1420; border-radius: 999px; padding: .18rem .5rem; color: #d8e2f2; font-size: .78rem; }
    .path { color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: .8rem; overflow-wrap: anywhere; }
    pre { margin: .7rem 0 0; white-space: pre-wrap; overflow-wrap: anywhere; border: 1px solid var(--border); border-radius: .65rem; background: #050b13; padding: .75rem; max-height: 22rem; overflow: auto; }
    mark { background: #fde047; color: #1f1a00; border-radius: .15rem; padding: 0 .07rem; }
    .actions { display: flex; flex-wrap: wrap; gap: .45rem; margin-top: .75rem; }
    dialog { width: min(980px, 94vw); max-height: 86vh; color: var(--text); background: #0b1420; border: 1px solid var(--border); border-radius: .8rem; }
    dialog::backdrop { background: rgba(0,0,0,.55); }
    .dialog-head { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    @media (max-width: 860px) { header, .query-row, .controls, .filters { grid-template-columns: 1fr; display: grid; } .controls, .filters { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 560px) { .controls, .filters { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>QMD Search</h1>
        <div class="subtle">Local search over Slack chunks, raw Slack markdown, and wiki pages.</div>
      </div>
      <button id="healthButton" type="button">Check service</button>
    </header>

    <form id="searchForm" class="panel search-panel">
      <div class="query-row">
        <div class="query-box">
          <input id="query" type="search" placeholder="Search terms, or user:alex in:#general after:2026-01-01" autocomplete="off" autofocus required />
          <div id="querySuggest" class="suggest-box" hidden></div>
        </div>
        <button id="clearButton" type="button">Clear</button>
        <button class="primary" type="submit">Search</button>
      </div>
      <div class="controls">
        <label>Mode
          <select id="mode"><option value="lex">Lexical</option><option value="vec" selected>Vector (semantic, fast)</option><option value="hybrid">Hybrid (slower)</option></select>
        </label>
        <label>Results
          <select id="limit"><option>10</option><option selected>25</option><option>50</option><option>100</option><option>250</option><option>500</option></select>
        </label>
        <label>Sort
          <select id="sort"><option value="relevance" selected>Relevance</option><option value="date-desc">Newest</option><option value="date-asc">Oldest</option><option value="channel">Channel/path</option><option value="corpus">Corpus</option></select>
        </label>
        <label>Within results
          <input id="within" type="text" placeholder="optional post-filter" />
        </label>
      </div>
      <div class="collections" aria-label="Collections">
        <span class="subtle">Collections:</span>
        <label><input type="checkbox" name="collection" value="chunks" checked /> Slack chunks</label>
        <label><input type="checkbox" name="collection" value="wiki" /> Wiki</label>
        <label><input type="checkbox" name="collection" value="raw" /> Raw Slack</label>
      </div>
      <div class="filters">
        <label>Channel
          <input id="channel" type="text" list="channelOptions" placeholder="general" />
        </label>
        <label>User
          <input id="user" type="text" list="userOptions" placeholder="Alex" />
        </label>
        <label>After
          <input id="dateFrom" type="date" />
        </label>
        <label>Before
          <input id="dateTo" type="date" />
        </label>
        <label>&nbsp;
          <button id="clearFiltersButton" type="button">Clear filters</button>
        </label>
      </div>
      <datalist id="channelOptions"></datalist>
      <datalist id="userOptions"></datalist>
    </form>

    <div id="status" class="status">Ready.</div>
    <section id="results" class="results" aria-live="polite"></section>
  </main>

  <dialog id="docDialog">
    <div class="dialog-head"><h2 id="docTitle">Document</h2><button id="closeDialog" type="button">Close</button></div>
    <div id="docBody"></div>
  </dialog>

<script>
const $ = (selector) => document.querySelector(selector);
const form = $('#searchForm');
const statusEl = $('#status');
const resultsEl = $('#results');
const dialog = $('#docDialog');
const docTitle = $('#docTitle');
const docBody = $('#docBody');
let lastResults = [];
let highlightTerms = [];
let facetState = {users: [], channels: []};
let suggestState = {items: [], active: 0, context: null};

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
}
function escapeRegex(value) { return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function selectedCollections() {
  const values = [...document.querySelectorAll('input[name="collection"]:checked')].map((input) => input.value);
  return values.length ? values.join(',') : 'chunks';
}
function normalizeFacet(value) { return String(value || '').trim().replace(/^#/, '').toLowerCase(); }
function quoteDecoratorValue(value) { return /\s/.test(String(value)) ? `"${String(value).replaceAll('"', '\\"')}"` : String(value); }
function currentSuggestContext() {
  const input = $('#query');
  const cursor = input.selectionStart || 0;
  const before = input.value.slice(0, cursor);
  const match = before.match(/(^|\s)(from|user|in|channel):("([^"]*)|'([^']*)|([^\s"]*))$/i);
  if (!match) return null;
  const key = match[2].toLowerCase();
  const type = key === 'from' || key === 'user' ? 'user' : 'channel';
  const typed = (match[4] ?? match[5] ?? match[6] ?? '').trim();
  return {key, type, typed, start: before.length - match[0].length + (match[1] || '').length, end: cursor};
}
function facetSuggestionText(item, type) {
  if (type === 'channel') return '#' + item.name;
  return item.realName && normalizeFacet(item.realName) !== normalizeFacet(item.name) ? `${item.name} — ${item.realName}` : item.name;
}
function suggestionsForContext(context) {
  if (!context) return [];
  const typed = normalizeFacet(context.typed);
  const source = context.type === 'user' ? facetState.users : facetState.channels;
  return source
    .filter((item) => {
      const fields = [item.name, item.id, item.realName, item.slackName].map(normalizeFacet).filter(Boolean);
      return !typed || fields.some((field) => field.startsWith(typed) || field.includes(typed));
    })
    .sort((a, b) => {
      const an = normalizeFacet(a.name);
      const bn = normalizeFacet(b.name);
      const ap = typed && an.startsWith(typed) ? 0 : 1;
      const bp = typed && bn.startsWith(typed) ? 0 : 1;
      return ap - bp || (b.count || 0) - (a.count || 0) || an.localeCompare(bn);
    })
    .slice(0, 12);
}
function renderQuerySuggest() {
  const box = $('#querySuggest');
  const context = currentSuggestContext();
  const items = suggestionsForContext(context);
  suggestState = {items, active: 0, context};
  if (!context) { box.hidden = true; box.innerHTML = ''; return; }
  if (!items.length) {
    const loaded = context.type === 'user' ? facetState.users.length : facetState.channels.length;
    box.hidden = false;
    box.innerHTML = `<div class="suggest-empty">${loaded ? `No matching ${context.type} suggestions.` : `Loading ${context.type} suggestions…`}</div>`;
    return;
  }
  box.hidden = false;
  box.innerHTML = items.map((item, index) => {
    const label = context.type === 'channel' ? '#' + item.name : item.name;
    const sub = context.type === 'channel'
      ? [item.id, item.count ? `${item.count} docs/messages` : ''].filter(Boolean).join(' · ')
      : [item.realName && normalizeFacet(item.realName) !== normalizeFacet(item.name) ? item.realName : '', item.slackName ? '@' + item.slackName : '', item.id, item.count ? `${item.count} messages` : ''].filter(Boolean).join(' · ');
    return `<button type="button" class="${index === 0 ? 'active' : ''}" data-suggest-index="${index}"><span>${escapeHtml(label)}</span><span class="suggest-sub">${escapeHtml(sub)}</span></button>`;
  }).join('');
}
function paintQuerySuggestActive() {
  [...$('#querySuggest').querySelectorAll('button[data-suggest-index]')].forEach((button, index) => button.classList.toggle('active', index === suggestState.active));
}
function applyQuerySuggestion(index = suggestState.active) {
  const context = suggestState.context;
  const item = suggestState.items[index];
  if (!context || !item) return false;
  const input = $('#query');
  const before = input.value.slice(0, context.start);
  const after = input.value.slice(context.end).replace(/^\s*/, '');
  const value = context.type === 'channel' ? '#' + item.name : quoteDecoratorValue(item.name);
  const replacement = `${context.key}:${value} `;
  input.value = before + replacement + after;
  const cursor = (before + replacement).length;
  input.setSelectionRange(cursor, cursor);
  $('#querySuggest').hidden = true;
  input.focus();
  return true;
}
function buildParams() {
  const params = new URLSearchParams({q: $('#query').value, mode: $('#mode').value, n: $('#limit').value, sort: $('#sort').value, collection: selectedCollections()});
  for (const id of ['channel', 'user', 'dateFrom', 'dateTo', 'within']) {
    const value = $('#' + id).value.trim();
    if (value) params.set(id, value);
  }
  return params;
}
function setStatus(message, kind = '') {
  statusEl.className = `status ${kind}`.trim();
  statusEl.textContent = message;
}
function buildHighlightTerms() {
  const stop = new Set(['and','or','the','for','with','from','that','this','what','when','where','how','why','user','channel','after','before','corpus','mode','sort']);
  return [$('#query').value, $('#channel').value, $('#user').value, $('#within').value]
    .join(' ')
    .replace(/(^|\s)(from|user|in|channel|after|before|on|corpus|mode|sort):("[^"]+"|'[^']+'|[^\s]+)/gi, ' ')
    .split(/\s+/)
    .map((term) => term.trim().replace(/^[^\p{L}\p{N}#@_.:-]+|[^\p{L}\p{N}#@_.:-]+$/gu, '').replace(/^#/, ''))
    .filter((term) => term.length >= 2 && !stop.has(term.toLowerCase()))
    .filter((term, index, array) => array.findIndex((other) => other.toLowerCase() === term.toLowerCase()) === index)
    .sort((a, b) => b.length - a.length)
    .slice(0, 25);
}
function highlight(value) {
  const html = escapeHtml(value || '');
  if (!highlightTerms.length) return html;
  const pattern = highlightTerms.map((term) => escapeRegex(term)).join('|');
  return pattern ? html.replace(new RegExp(`(${pattern})`, 'gi'), '<mark>$1</mark>') : html;
}
function resultBadges(result, index) {
  const meta = result.meta || {};
  const score = typeof result.score === 'number' ? result.score.toFixed(3) : result.score;
  return [
    `#${index + 1}`,
    meta.corpus || result.backend || 'result',
    meta.channel || '',
    meta.date || '',
    score !== undefined && score !== '' ? `score ${score}` : '',
  ].filter(Boolean).map((badge) => `<span class="badge">${highlight(badge)}</span>`).join('');
}
function resultHtml(result, index) {
  const file = result.file || result.path || result.id || '';
  const snippet = result.snippet || result.text || '';
  return `<article class="panel result" data-index="${index}">
    <div class="badges">${resultBadges(result, index)}</div>
    <h2>${highlight(result.title || file || 'Untitled')}</h2>
    <div class="path">${highlight(file)}</div>
    <pre>${highlight(snippet || 'No snippet returned.')}</pre>
    <div class="actions">
      ${file ? '<button type="button" data-action="open">Open source</button><button type="button" data-action="copy-uri">Copy URI</button>' : ''}
      <button type="button" data-action="copy-snippet">Copy snippet</button>
      <button type="button" data-action="copy-citation">Copy citation</button>
      <button type="button" data-action="json">JSON</button>
    </div>
  </article>`;
}
async function copyText(value) {
  try {
    await navigator.clipboard.writeText(value);
    setStatus('Copied.');
  } catch {
    setStatus('Clipboard unavailable in this browser; select and copy manually.', 'warn');
  }
}
function citationFor(result) { return `> ${result.snippet || result.text || ''}\n\nSource: ${result.file || result.path || ''}`; }
async function search() {
  setStatus('Searching…');
  resultsEl.innerHTML = '';
  highlightTerms = buildHighlightTerms();
  try {
    const response = await fetch(`/api/search?${buildParams()}`);
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'search failed');
    lastResults = data.results || [];
    resultsEl.innerHTML = lastResults.map(resultHtml).join('') || '<p class="subtle">No results. Try fewer filters or a broader query.</p>';
    const elapsed = data.elapsedMs === undefined ? '' : ` in ${(Number(data.elapsedMs) / 1000).toFixed(2)}s`;
    const cached = data.cacheHit ? ' from cache' : '';
    const message = `${data.returned || 0} results${cached}; ${data.matched || 0} matched from ${data.fetched || 0} fetched${elapsed}. Backend: ${data.backend || 'qmd'}.`;
    setStatus(data.warning ? `${message} ${data.warning}` : message, data.warning ? 'warn' : '');
  } catch (error) {
    lastResults = [];
    setStatus(`Error: ${error.message}`, 'bad');
  }
}
async function openResult(result) {
  const file = result.file || result.path || '';
  docTitle.textContent = file || 'Result';
  docBody.innerHTML = '<p class="subtle">Loading…</p>';
  dialog.showModal();
  try {
    const response = await fetch(`/api/get?target=${encodeURIComponent(file)}&lines=220`);
    const body = await response.text();
    docBody.innerHTML = response.ok ? `<pre>${highlight(body)}</pre>` : `<pre>${escapeHtml(body)}</pre>`;
  } catch (error) {
    docBody.innerHTML = `<pre>${escapeHtml(error.message)}</pre>`;
  }
}
async function loadFacets() {
  try {
    const started = performance.now();
    const response = await fetch('/api/facets');
    const facets = await response.json();
    if (!response.ok) throw new Error(facets.error || 'facet load failed');
    facetState = {users: facets.users || [], channels: facets.channels || []};
    $('#channelOptions').innerHTML = facetState.channels.slice(0, 300).map((channel) => `<option value="${escapeHtml(channel.name)}">${escapeHtml([channel.id, channel.count ? `${channel.count} matches` : ''].filter(Boolean).join(' · '))}</option>`).join('');
    $('#userOptions').innerHTML = facetState.users.slice(0, 300).map((user) => `<option value="${escapeHtml(user.name)}">${escapeHtml([user.realName, user.slackName ? '@' + user.slackName : '', user.id, user.count ? `${user.count} matches` : ''].filter(Boolean).join(' · '))}</option>`).join('');
    if (statusEl.textContent === 'Ready.') setStatus(`Ready. Loaded ${facetState.users.length} user and ${facetState.channels.length} channel suggestions in ${((performance.now() - started) / 1000).toFixed(2)}s.`);
    renderQuerySuggest();
  } catch (error) {
    setStatus(`Facet suggestions unavailable: ${error.message}`, 'warn');
  }
}
async function checkHealth() {
  try {
    const response = await fetch('/health');
    const health = await response.json();
    if (!response.ok || !health.ok) throw new Error(health.error || 'unhealthy');
    setStatus(`Service OK. Max results ${health.maxResults}. Root ${health.root}.`);
  } catch (error) {
    setStatus(`Service check failed: ${error.message}`, 'bad');
  }
}
function clearFilters() {
  for (const id of ['channel', 'user', 'dateFrom', 'dateTo', 'within']) $('#' + id).value = '';
  setStatus('Filters cleared.');
}
form.addEventListener('submit', (event) => { event.preventDefault(); search(); });
$('#query').addEventListener('input', renderQuerySuggest);
$('#query').addEventListener('click', renderQuerySuggest);
$('#query').addEventListener('keydown', (event) => {
  const box = $('#querySuggest');
  if (box.hidden) return;
  if (event.key === 'ArrowDown') { event.preventDefault(); suggestState.active = Math.min(suggestState.active + 1, suggestState.items.length - 1); paintQuerySuggestActive(); }
  else if (event.key === 'ArrowUp') { event.preventDefault(); suggestState.active = Math.max(suggestState.active - 1, 0); paintQuerySuggestActive(); }
  else if (event.key === 'Enter' || event.key === 'Tab') { if (applyQuerySuggestion()) event.preventDefault(); }
  else if (event.key === 'Escape') { box.hidden = true; }
});
$('#querySuggest').addEventListener('mousedown', (event) => {
  const button = event.target.closest('button[data-suggest-index]');
  if (!button) return;
  event.preventDefault();
  applyQuerySuggestion(Number(button.dataset.suggestIndex));
});
document.addEventListener('click', (event) => {
  if (!event.target.closest('.query-box')) $('#querySuggest').hidden = true;
});
$('#clearButton').addEventListener('click', () => { $('#query').value = ''; $('#querySuggest').hidden = true; clearFilters(); resultsEl.innerHTML = ''; lastResults = []; $('#query').focus(); });
$('#clearFiltersButton').addEventListener('click', clearFilters);
$('#healthButton').addEventListener('click', checkHealth);
$('#closeDialog').addEventListener('click', () => dialog.close());
resultsEl.addEventListener('click', (event) => {
  const button = event.target.closest('button[data-action]');
  if (!button) return;
  const article = event.target.closest('.result');
  const result = lastResults[Number(article.dataset.index)];
  if (!result) return;
  const action = button.dataset.action;
  if (action === 'open') return openResult(result);
  if (action === 'copy-uri') return copyText(result.file || result.path || '');
  if (action === 'copy-snippet') return copyText(result.snippet || result.text || '');
  if (action === 'copy-citation') return copyText(citationFor(result));
  if (action === 'json') {
    docTitle.textContent = 'Result JSON';
    docBody.innerHTML = `<pre>${escapeHtml(JSON.stringify(result, null, 2))}</pre>`;
    dialog.showModal();
  }
});
loadFacets();
</script>
</body>
</html>
